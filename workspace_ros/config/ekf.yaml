ekf_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    imu0: /imu/fixed_cov
    imu0_config: [false,false,false, false,false,true, false,false,false, false,false,true, false,false,false]
    imu0_queue_size: 10
    imu0_nodelay: true
    imu0_differential: false
    imu0_relative: false

    odom0: /odometry/gps
    odom0_config: [true,true,false, false,false,false, false,false,false, false,false,false, false,false,false]
    odom0_queue_size: 10
    odom0_nodelay: true
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 3.0
