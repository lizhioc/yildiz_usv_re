amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 15.0
    laser_min_range: 0.1
    laser_model_type: "likelihood_field"
    max_beams: 120
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.1
    update_min_d: 0.1
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: /roboboat/sensors/lidar/scan

bt_navigator:
  ros__parameters:
    use_sim_time: true 
    global_frame: map
    robot_base_frame: base_link
    odom_topic: "/odometry/filtered"
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    plugin_lib_names: [
      nav2_compute_path_to_pose_action_bt_node, nav2_compute_path_through_poses_action_bt_node,
      nav2_smooth_path_action_bt_node, nav2_follow_path_action_bt_node, nav2_spin_action_bt_node,
      nav2_wait_action_bt_node, nav2_assisted_teleop_action_bt_node, nav2_back_up_action_bt_node,
      nav2_drive_on_heading_bt_node, nav2_clear_costmap_service_bt_node, nav2_is_stuck_condition_bt_node,
      nav2_goal_reached_condition_bt_node, nav2_goal_updated_condition_bt_node, nav2_globally_updated_goal_condition_bt_node,
      nav2_is_path_valid_condition_bt_node, nav2_initial_pose_received_condition_bt_node,
      nav2_reinitialize_global_localization_service_bt_node, nav2_rate_controller_bt_node,
      nav2_distance_controller_bt_node, nav2_speed_controller_bt_node, nav2_truncate_path_action_bt_node,
      nav2_truncate_path_local_action_bt_node, nav2_goal_updater_node_bt_node, nav2_recovery_node_bt_node,
      nav2_pipeline_sequence_bt_node, nav2_round_robin_node_bt_node, nav2_transform_available_condition_bt_node,
      nav2_time_expired_condition_bt_node, nav2_path_expiring_timer_condition, nav2_distance_traveled_condition_bt_node,
      nav2_single_trigger_bt_node, nav2_goal_updated_controller_bt_node, nav2_is_battery_low_condition_bt_node,
      nav2_navigate_through_poses_action_bt_node, nav2_navigate_to_pose_action_bt_node,
      nav2_remove_passed_goals_action_bt_node, nav2_planner_selector_bt_node, nav2_controller_selector_bt_node,
      nav2_goal_checker_selector_bt_node, nav2_controller_cancel_bt_node, nav2_path_longer_on_approach_bt_node,
      nav2_wait_cancel_bt_node, nav2_spin_cancel_bt_node, nav2_back_up_cancel_bt_node,
      nav2_assisted_teleop_cancel_bt_node, nav2_drive_on_heading_cancel_bt_node, nav2_is_battery_charging_condition_bt_node
    ]

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: true 

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: true 

controller_server:
  ros__parameters:
    use_sim_time: true 
    controller_frequency: 20.0                
    min_x_velocity_threshold: 0.05
    min_y_velocity_threshold: 0.05
    min_theta_velocity_threshold: 0.05

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 12.0

    general_goal_checker:
      stateful: true 
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 1.0
      yaw_goal_tolerance: 1.0
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 1.2        
      max_angular_accel: 2.0           
      allow_reversing: false 
     
      lookahead_time: 2.0
      use_velocity_scaled_lookahead_dist: true
      min_lookahead_dist: 1.0
      max_lookahead_dist: 3.0
      cost_scaling_factor: 0.5
      inflation_radius: 1.5

      use_regulated_linear_velocity_scaling: true    
      regulated_linear_scaling_min_speed: 0.1
      regulated_linear_scaling_min_radius: 2.0 
      use_cost_regulated_linear_velocity_scaling: false
      cost_scaling_dist: 4.0  
      cost_scaling_gain: 0.8
      use_approach_vel_scaling: true
      min_approach_linear_velocity: 0.1    
      approach_velocity_scaling_dist: 2.0

      use_rotate_to_heading: false 
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 2.0
      min_distance_to_obstacle: 0.8
      stateful: true
      
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 20
      height: 15
      resolution: 0.05
      footprint: "[[0.5, 0.3], [0.5, -0.3], [-0.5, -0.3], [-0.5, 0.3]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0
        inflation_radius: 1.5
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        publish_observations: True
        enabled: True
        observation_sources: scan
        scan:
          topic:  /roboboat/sensors/lidar/scan
          max_obstacle_height: 1.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          obstacle_max_range: 10.0
          obstacle_min_range: 0.1
          raytrace_max_range: 10.0
          raytrace_min_range: 0.1
      always_send_full_costmap: True
      
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: false
      width: 65
      height: 18
      footprint: "[[0.5, 0.3], [0.5, -0.3], [-0.5, -0.3], [-0.5, 0.3]]"
      resolution: 0.05
      track_unknown_space: True
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0
        inflation_radius: 1.2
      always_send_full_costmap: True
      
map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.25
      cost_travel_multiplier: 2.0 
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      smoother:
        max_iterations: 1000
        w_smooth: 0.4
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true 
        refinement_num: 2
        
        
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 1.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: map
    local_frame: odom 
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: true
    
    simulate_ahead_time: 3.0
    max_rotational_vel: 1.0                 
    min_rotational_vel: 0.2
    rotational_acc_lim: 2.0

robot_state_publisher:
  ros__parameters:
    use_sim_time: true
    

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false  
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 50


velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: true
    feedback: "CLOSED_LOOP"

    max_velocity: [2.0, 0.0, 2.0]
    min_velocity: [0.0, 0.0, -2.0]
    max_accel: [2.0, 0.0, 1.0]
    max_decel: [-2.0, 0.0, -2.0]

    odom_topic: "odometry/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.02, 0.0, 0.02]
    velocity_timeout: 1.0
